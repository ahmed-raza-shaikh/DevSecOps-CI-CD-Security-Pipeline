<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DevSecOps CI/CD Security Pipeline Architecture</title>
  <desc id="desc">A pull request enters GitHub Actions and passes through Trivy, tfsec, Snyk, and OWASP ZAP gates before merge to main.</desc>
  <rect width="1200" height="640" rx="24" fill="#07111F"/>
  <rect x="28" y="28" width="1144" height="584" rx="22" fill="#0B1526" stroke="#21314D" stroke-width="2"/>

  <text x="72" y="88" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">DevSecOps CI/CD Security Pipeline</text>
  <text x="72" y="121" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Automated pull request security gates for container, IaC, dependency, and runtime web risk</text>

  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="185" width="188" height="122" rx="18" fill="#10233A" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="112" cy="226" r="20" fill="#38BDF8"/>
    <path d="M103 226h18M112 217v18" stroke="#07111F" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="346" fill="#7DD3FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">SOURCE EVENT</text>
    <text x="112" y="224" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle"></text>
    <text x="92" y="267" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">Pull Request</text>
    <text x="92" y="292" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Target branch: main</text>
  </g>

  <line x1="271" y1="246" x2="358" y2="246" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="374" y="174" width="224" height="144" rx="18" fill="#13243B" stroke="#64748B" stroke-width="2"/>
    <rect x="402" y="204" width="54" height="54" rx="12" fill="#1E293B" stroke="#94A3B8"/>
    <path d="M418 232l8 8 15-20" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="474" y="225" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">GitHub Actions</text>
    <text x="474" y="252" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Builds app container</text>
    <text x="474" y="275" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Runs security gates</text>
  </g>

  <line x1="610" y1="246" x2="694" y2="246" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="710" y="150" width="418" height="300" rx="20" fill="#0F1D31" stroke="#334155" stroke-width="2"/>
    <text x="742" y="190" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Critical Security Gates</text>
    <text x="742" y="217" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Each gate returns a non-zero exit code on blocking findings.</text>

    <rect x="742" y="246" width="160" height="70" rx="14" fill="#123524" stroke="#22C55E"/>
    <text x="766" y="276" fill="#DCFCE7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Trivy</text>
    <text x="766" y="299" fill="#BBF7D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Container + config</text>

    <rect x="930" y="246" width="160" height="70" rx="14" fill="#332316" stroke="#F59E0B"/>
    <text x="954" y="276" fill="#FEF3C7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">tfsec</text>
    <text x="954" y="299" fill="#FDE68A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Terraform IaC</text>

    <rect x="742" y="344" width="160" height="70" rx="14" fill="#2D1735" stroke="#C084FC"/>
    <text x="766" y="374" fill="#F3E8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Snyk</text>
    <text x="766" y="397" fill="#E9D5FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">SCA dependencies</text>

    <rect x="930" y="344" width="160" height="70" rx="14" fill="#351A1A" stroke="#F87171"/>
    <text x="954" y="374" fill="#FEE2E2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">OWASP ZAP</text>
    <text x="954" y="397" fill="#FECACA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Baseline DAST</text>
  </g>

  <line x1="919" y1="462" x2="919" y2="518" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="740" y="530" width="360" height="64" rx="16" fill="#14243A" stroke="#38BDF8" stroke-width="2"/>
    <text x="773" y="568" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Merge blocked until security gates pass</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="420" width="526" height="128" rx="18" fill="#111D2E" stroke="#334155" stroke-width="2"/>
    <text x="104" y="459" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Business Outcome</text>
    <text x="104" y="491" fill="#A9B8D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Shift-left enforcement reduces late-stage security rework.</text>
    <text x="104" y="521" fill="#38BDF8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">70% fewer production security defects across 3 client codebases</text>
  </g>
</svg>
